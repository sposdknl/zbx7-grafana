---
- name: Create Zabbix host groups
  community.zabbix.zabbix_group:
    host_groups:
      - Web Certificate
      - Linux Virtual Machines
    state: present

# Odstranění defaultního hostitele pro vyčištění prostředí
- name: Remove default Zabbix server host
  community.zabbix.zabbix_host:
    host_name: Zabbix server
    state: absent

# Definice koncových uzlů včetně přiřazení monitorovacích šablon
- name: Create Zabbix host for Bastion-srv03
  community.zabbix.zabbix_host:
    host_name: bastion-srv03
    visible_name: Bastion-srv03
    host_groups:
      - Linux Virtual Machines
    link_templates:
      - Linux by Zabbix agent # Standardní OS monitoring
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.5
        dns: ""
        port: "10050"
    state: present

- name: Create Zabbix host for Grafana-srv02
  community.zabbix.zabbix_host:
    host_name: grafana-srv02
    visible_name: Grafana-srv02
    host_groups:
      - Linux Virtual Machines
    link_templates:
      - Linux by Zabbix agent
      - Docker by Zabbix agent 2
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.3
        dns: ""
        port: "10050"
    state: present

- name: Create Zabbix host for Zabbix-srv01
  community.zabbix.zabbix_host:
    host_name: zabbix-srv01
    visible_name: Zabbix-srv01
    host_groups:
      - Linux Virtual Machines
      - Zabbix servers
    link_templates:
      - Linux by Zabbix agent
      - Docker by Zabbix agent 2
      - Zabbix server health
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.2
        dns: ""
        port: "10050"
    state: present


- name: Create Zabbix host for school web cerfificate
  community.zabbix.zabbix_host:
    host_name: sposdk.cz
    visible_name: SPOS Web Certificate
    host_groups:
      - Web Certificate
    link_templates:
      - Website certificate by Zabbix agent 2
    interfaces:
      - type: 1
        main: 1
        useip: 1
        ip: 192.168.1.2
        dns: ""
        port: "10050"
    macros:
      - macro: "{$CERT.WEBSITE.HOSTNAME}"
        value: "sposdk.cz"
    state: present